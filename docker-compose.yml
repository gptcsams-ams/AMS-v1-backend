version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports: ["127.0.0.1:5432:5432"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]
    ports: ["127.0.0.1:6379:6379"]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    image: ams/api:${VERSION:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      SCHOOL_NAME: ${SCHOOL_NAME}
      INSIGHTFACE_MODEL: ${INSIGHTFACE_MODEL:-buffalo_s}
      INSIGHTFACE_CTX_ID: ${INSIGHTFACE_CTX_ID:--1}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
      MSG91_API_KEY: ${MSG91_API_KEY}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MEDIA_ROOT: /app/media
    volumes: [media_data:/app/media]
    ports: ["127.0.0.1:8000:8000"]

volumes:
  db_data:
  redis_data:
  media_data:
